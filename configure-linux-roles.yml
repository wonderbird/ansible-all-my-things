---
- name: Configure linux roles
  hosts: linux
  become: true

  vars:
    ansible_user: "{{ my_ansible_user }}"
    desktop_user_names: "{{ desktop_users | map(attribute='name') | list }}"

  roles:
    - claude_code
    - role: google_chrome
      tags: not-supported-on-vagrant-arm64
    # FR-008: if this role is ever invoked via ansible.builtin.include_role,
    # the caller MUST pass apply: {tags: [not-supported-on-vagrant-arm64]}
    # to propagate the skip tag to inner tasks.
    - role: android_studio
      tags: not-supported-on-vagrant-arm64

    # Optional roles - uncomment as needed
    #- cursor_ide
