---
# The host to back up is configured via the `backup_from_host` variable.
# The default is set in inventories/group_vars/all/vars.yml.
# Override at runtime with: ansible-playbook backup.yml -e backup_from_host=hobbiton

# Per user configuration
- import_playbook: playbooks/backup/home-folder-files.yml
- import_playbook: playbooks/backup/keyring.yml

# Applications
- import_playbook: playbooks/backup/chromium-settings.yml
- import_playbook: playbooks/backup/claude-settings.yml
#- import_playbook: playbooks/backup/cursor-settings.yml
- import_playbook: playbooks/backup/google-chrome-settings.yml
- import_playbook: playbooks/backup/vscode-settings.yml
