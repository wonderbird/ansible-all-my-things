name: Docker

# Pipeline: build → test → push (push only on non-PR events).
# - build: per-arch native matrix (amd64/arm64). Always produces tarball artifact.
#   Labels-only metadata-action bakes OCI provenance into the image.
#   No registry push. permissions: contents:read only.
# - test: downloads artifact, loads image, runs container-structure-test.
#   Identical path for PR and non-PR. No registry interaction.
# - push: non-PR only (needs: [build, test]). Loads artifact, pushes to ghcr.io
#   with arch-gated tags (amd64 owns unqualified :latest and semver tags).
#   Cosign signs after push. permissions: packages:write + id-token:write here only.
#
# Tag generation via docker/metadata-action runs only in the push job (with tags:).
# The build job has a labels-only metadata-action call (no tags: input).
# Do NOT add time-based tag patterns (type=schedule, timestamps) to metadata-action
# without piping tags between jobs — they would diverge across job boundaries.

on:
  schedule:
    - cron: '0 4 * * 1'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME cannot use expressions here (workflow-level env does not support ${{ }}).
  # Each job computes it via: echo "IMAGE_NAME=..." >> $GITHUB_ENV

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/ansible-toolchain" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Labels-only call: no tags: input. Populates steps.meta.outputs.labels
      # (org.opencontainers.image.source, .revision, .created, etc.) so the
      # tarball image carries full OCI provenance when pushed.
      - name: Extract OCI labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./.devcontainer
          platforms: linux/${{ matrix.arch }}
          load: true
          push: false
          tags: test-image:${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Save image tarball
        run: docker save test-image:${{ matrix.arch }} | gzip > image-${{ matrix.arch }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.arch }}
          path: image-${{ matrix.arch }}.tar.gz
          retention-days: 1

  test:
    needs: build
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install container-structure-test
        run: |
          curl -LO "https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-${{ matrix.arch }}"
          chmod +x container-structure-test-linux-${{ matrix.arch }}
          sudo mv container-structure-test-linux-${{ matrix.arch }} /usr/local/bin/container-structure-test

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.arch }}

      - name: Load image from artifact
        run: docker load < image-${{ matrix.arch }}.tar.gz

      - name: Run Structure Tests (${{ matrix.arch }})
        run: |
          container-structure-test test \
            --image "test-image:${{ matrix.arch }}" \
            --config .devcontainer/tests.yaml

  push:
    needs: [build, test]
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/ansible-toolchain" >> $GITHUB_ENV

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Unqualified tags (latest, vX.Y.Z, vX.Y, vX) are emitted only by amd64
      # to eliminate the last-writer race when both matrix legs push in parallel.
      # arm64 receives only latest-arm64.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && matrix.arch == 'amd64' }}
            type=raw,value=latest-${{ matrix.arch }},enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ matrix.arch == 'amd64' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.arch == 'amd64' }}
            type=semver,pattern={{major}},enable=${{ matrix.arch == 'amd64' }}

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.arch }}

      - name: Load image from artifact
        run: docker load < image-${{ matrix.arch }}.tar.gz

      - name: Tag and push image
        id: push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          DIGEST=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag "test-image:${{ matrix.arch }}" "$tag"
            docker push "$tag"
            if [ -z "$DIGEST" ]; then
              DIGEST=$(docker inspect --format='{{range .RepoDigests}}{{println .}}{{end}}' "$tag" \
                | grep "^${IMAGE_NAME}@" | head -1 | cut -d@ -f2)
            fi
          done <<< "$TAGS"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
