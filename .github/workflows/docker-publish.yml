name: Docker

# Pipeline overview:
# - build: per-arch native matrix (amd64 on ubuntu-24.04, arm64 on ubuntu-24.04-arm).
#   PR path: build → save tarball → upload artifact (no registry push).
#   Non-PR path: build → push to ghcr.io → sign with cosign.
# - test: download artifact (PR) or pull from registry (non-PR) → structure tests.

on:
  schedule:
    - cron: '0 4 * * 1'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME cannot use expressions here (workflow-level env does not support ${{ }}).
  # Each job computes it via: echo "IMAGE_NAME=..." >> $GITHUB_ENV

jobs:
  build:

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/ansible-toolchain" >> $GITHUB_ENV

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 #v4.1.1
        with:
          cosign-release: 'v2.2.4'

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # arch-specific latest tag so each arch can be tested independently
            type=raw,value=latest-${{ matrix.arch }},enable={{is_default_branch}}
            # tag PRs so the built image has a reference for docker save
            type=ref,event=pr
            # semver tags: v1.2.3 → 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Build image for this arch.
      # PR: load into local daemon (no push). Non-PR: push to registry.
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./.devcontainer
          platforms: linux/${{ matrix.arch }}
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      # On PRs: export the built image as a tarball for the test job.
      # Avoids any registry push while keeping both archs testable.
      - name: Save image tarball
        if: github.event_name == 'pull_request'
        run: |
          docker tag "$(echo '${{ steps.meta.outputs.tags }}' | head -1)" test-image:${{ matrix.arch }}
          docker save test-image:${{ matrix.arch }} | gzip > image-${{ matrix.arch }}.tar.gz

      - name: Upload image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.arch }}
          path: image-${{ matrix.arch }}.tar.gz
          retention-days: 1

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  # Test the container structure on both architectures.
  # On PRs: download the artifact built in the build job and load it locally.
  # On non-PR: pull the image from the registry.
  test:

    needs: build
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/ansible-toolchain" >> $GITHUB_ENV

      # Install container-structure-test
      # https://github.com/GoogleContainerTools/container-structure-test
      - name: Install container-structure-test
        run: |
          curl -LO "https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-${{ matrix.arch }}"
          chmod +x container-structure-test-linux-${{ matrix.arch }}
          sudo mv container-structure-test-linux-${{ matrix.arch }} /usr/local/bin/container-structure-test

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from registry
        if: github.event_name != 'pull_request'
        run: docker pull $IMAGE_NAME:latest-${{ matrix.arch }}

      - name: Download image artifact
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.arch }}

      - name: Load image from artifact
        if: github.event_name == 'pull_request'
        run: docker load < image-${{ matrix.arch }}.tar.gz

      - name: Set test image reference
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "TEST_IMAGE=test-image:${{ matrix.arch }}" >> $GITHUB_ENV
          else
            echo "TEST_IMAGE=$IMAGE_NAME:latest-${{ matrix.arch }}" >> $GITHUB_ENV
          fi

      - name: Run Structure Tests (${{ matrix.arch }})
        run: |
          container-structure-test test \
            --image "$TEST_IMAGE" \
            --config .devcontainer/tests.yaml
