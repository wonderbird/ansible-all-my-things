formula = "pr-review-cycle"
description = "PR review cycle: human review with findings tracking and merge gate"
version = 1
type = "workflow"

[[steps]]
id = "review-pr"
title = "Review PR and collect findings"
type = "story"
description = """Human reviews the PR and files each finding as a child task.

For each finding discovered during review:
1. Create finding task as child of this story:
   bd create --title="<finding>" --type=task --parent <this-story-id>
2. Wire finding to block the merge task:
   bd dep add <merge-task-id> <finding-task-id>

All finding tasks must be closed before the merge task becomes actionable."""
acceptance = "Review complete; all findings filed as child tasks blocking the merge gate"

[[steps]]
id = "merge-branch"
title = "Merge feature branch to origin/main"
type = "task"
# Post-pour wiring (do NOT use 'needs' — conflicts with parent-child reparenting):
# 1. bd update <merge-task-id> --parent <story-id>   (nest under story)
# 2. For each finding: bd dep add <merge-task-id> <finding-id>
description = """Merge the feature branch to origin/main after all findings are resolved.

Pre-conditions (beads deps enforce):
- All finding tasks must be closed (they block this task).

Steps:
1. Verify no open blockers: bd show <this-task-id>
2. Open PR: gh pr create --repo wonderbird/ansible-all-my-things \\
     --head eudicy:<branch> --base main
3. User merges on GitHub."""
acceptance = "Feature branch merged to origin/main; PR closed"
