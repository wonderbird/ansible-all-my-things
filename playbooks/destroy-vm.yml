---
- name: Destroy VM
  hosts: localhost
  gather_facts: true
  vars:
    provider: tart
  pre_tasks:
    - name: Assert provider is supported
      ansible.builtin.assert:
        that: provider in ['tart', 'docker']
        fail_msg: >-
          Unsupported provider '{{ provider }}'. Allowed values: tart, docker.
          Run: ansible-playbook playbooks/destroy-vm.yml -e provider=<tart|docker> -e hostname=<name>

    - name: Assert hostname variable is defined
      ansible.builtin.assert:
        that: hostname is defined and hostname | length > 0
        fail_msg: >-
          Required variable 'hostname' is not defined.
          Run: ansible-playbook playbooks/destroy-vm.yml -e hostname=<name>
  tasks:
    - name: Run VM destruction tasks
      ansible.builtin.include_tasks: "tasks/destroy/{{ provider }}.yml"
