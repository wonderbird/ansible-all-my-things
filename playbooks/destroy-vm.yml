---
- name: Destroy VM
  hosts: localhost
  gather_facts: true
  vars:
    provider: tart
    assert_provider_usage_hint: >-
      Run: ansible-playbook playbooks/destroy-vm.yml -e provider=<tart|docker|hcloud|aws> -e hostname=<name>
  pre_tasks:
    - name: Assert provider and profile are supported
      ansible.builtin.import_tasks: tasks/assert-provider-profile.yml

    - name: Assert hostname variable is defined
      ansible.builtin.assert:
        that: hostname is defined and hostname | length > 0
        fail_msg: >-
          Required variable 'hostname' is not defined.
          Run: ansible-playbook playbooks/destroy-vm.yml -e hostname=<name>
  tasks:
    - name: Run VM destruction tasks
      ansible.builtin.include_tasks: "tasks/destroy/{{ provider }}.yml"
