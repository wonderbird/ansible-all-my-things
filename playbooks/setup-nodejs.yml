---
- hosts: linux
  become: true

  vars:
    ansible_user: "{{ my_ansible_user }}"
    desktop_user_names: "{{ desktop_users | map(attribute='name') | list }}"
    first_desktop_user: "{{ desktop_user_names[0] }}"

  tasks:
    - name: Install curl
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: true

    - name: Download NVM install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh
        dest: /tmp/nvm-install.sh
        mode: '0755'

    - name: Install NVM
      ansible.builtin.shell:
        cmd: /tmp/nvm-install.sh
        creates: "/home/{{ item }}/.nvm/nvm.sh"
      become_user: "{{ item }}"
      loop: "{{ desktop_user_names }}"

    - name: Install LTS/Jod Node.js
      shell: |
        . /home/{{ item }}/.nvm/nvm.sh
        prev_default=$(nvm version default 2>/dev/null || echo none)
        install_output=$(nvm install lts/jod 2>&1)
        echo "$install_output"
        nvm use lts/jod
        nvm alias default lts/jod
        new_default=$(nvm version default)
        if echo "$install_output" | grep -q "is already installed" && [ "$prev_default" = "$new_default" ]; then
          echo NO_CHANGE
        else
          echo CHANGED
        fi
      args:
        executable: /bin/bash
      become_user: "{{ item }}"
      loop: "{{ desktop_user_names }}"
      register: nvm_install_result
      changed_when: "'CHANGED' in nvm_install_result.stdout"

    - name: Identify current Node.js version
      shell: |
        . /home/{{ first_desktop_user }}/.nvm/nvm.sh
        nvm current
      args:
        executable: /bin/bash
      become_user: "{{ first_desktop_user }}"
      register: nvm_current_output
      changed_when: false

    - name: Install frequently used global npm packages
      shell: |
        . /home/{{ item }}/.nvm/nvm.sh
        npm install --global \
          eslint \
          markdownlint-cli \
          prettier \
          typescript
      # Note: Last package is used in the `creates` check below for idempotency.
      args:
        executable: /bin/bash
        creates: "/home/{{ item }}/.nvm/versions/node/{{ nvm_current_output.stdout_lines[0] }}/lib/node_modules/typescript"
      become_user: "{{ item }}"
      loop: "{{ desktop_user_names }}"

