---
- name: Configure basic profile linux roles
  hosts: basic
  become: true

  vars:
    ansible_user: "{{ my_ansible_user }}"
    desktop_user_names: "{{ desktop_users | map(attribute='name') | list }}"

  roles:
    - podman
    - tmux
    - ruby
    - python
    - dolt_sql_server
    - claude_code

- name: Configure desktop profile linux roles
  hosts: desktop
  become: true

  vars:
    ansible_user: "{{ my_ansible_user }}"
    desktop_user_names: "{{ desktop_users | map(attribute='name') | list }}"

  # Mirrors configure-linux-roles.yml's role list verbatim (FR-004) — an
  # accepted Principle II/XI exception, logged in plan.md Complexity
  # Tracking. The desktop group is the switch; no when: needed (FR-012).
  roles:
    - podman
    - ruby
    - python
    - claude_code
    - tmux
    - nerd_font
    - dolt_sql_server
    - role: google_chrome
      tags: not-supported-on-vagrant-arm64
