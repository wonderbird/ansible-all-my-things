---
- name: Restore Claude settings
  hosts: linux
  tags: not-supported-on-vagrant-docker
  become: true

  vars:
    ansible_user: "{{ my_ansible_user }}"
    restore_user: "{{ desktop_users[0].name }}"

  tasks:
    - name: Restore Claude settings
      include_tasks: restore.yml
      vars:
        users: "{{ [restore_user] }}"
        backup_file: "claude-backup.tar.gz"
        destination_beneath_home: ".claude"
        delete_before_beneath_home:
          - ".claude"
          - ".claude.json"

    - name: Reinstall oh-my-claudecode (restores hud/ and plugins/)
      shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        omc update
      become_user: "{{ restore_user }}"
