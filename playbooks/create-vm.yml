---
- name: Create VM
  hosts: localhost
  gather_facts: true
  vars:
    provider: tart
    profile: basic
    vm_cpus: 4
    vm_memory_mb: 8192
    vm_disk_size_gb: 20
    assert_provider_usage_hint: >-
      Run: ansible-playbook playbooks/create-vm.yml -e provider=<tart|docker|hcloud|aws>
  pre_tasks:
    - name: Assert provider and profile are supported
      ansible.builtin.import_tasks: tasks/assert-provider-profile.yml
  tasks:
    - name: Run VM creation tasks
      ansible.builtin.include_tasks: "tasks/create/{{ provider }}.yml"
