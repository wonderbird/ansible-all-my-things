---
- name: Update pinned versions in role defaults files
  hosts: localhost
  gather_facts: false
  vars:
    _roles_dir: "{{ playbook_dir }}/../../roles"
  tasks:
    # --- Read current Java identifier to derive major version for fetch ---
    - name: Read java role defaults
      ansible.builtin.slurp:
        src: "{{ _roles_dir }}/java/defaults/main.yml"
      register: _java_defaults_raw

    - name: Derive Java major version from current identifier
      vars:
        _java_id_match: >-
          {{ _java_defaults_raw.content | b64decode
             | regex_search('java_sdkman_identifier:\s*"([^"]+)"', '\1')
             | default([], true) }}
      ansible.builtin.set_fact:
        _current_java_major: "{{ (_java_id_match | first).split('.')[0] | int }}"

    # --- Fetch upstream versions ---
    - name: Fetch Flutter upstream version
      ansible.builtin.include_tasks: tasks/fetch-flutter-version.yml

    - name: Fetch gitmux upstream version
      ansible.builtin.include_tasks: tasks/fetch-github-release.yml
      vars:
        github_repo: "arl/gitmux"

    - name: Save gitmux fetched tag
      ansible.builtin.set_fact:
        fetched_gitmux_tag: "{{ fetched_github_tag }}"

    - name: Fetch Nerd Fonts (Hack) upstream version
      ansible.builtin.include_tasks: tasks/fetch-github-release.yml
      vars:
        github_repo: "ryanoasis/nerd-fonts"

    - name: Save Nerd Fonts fetched tag
      ansible.builtin.set_fact:
        fetched_font_tag: "{{ fetched_github_tag }}"

    - name: Fetch Java upstream version for major {{ _current_java_major }}
      ansible.builtin.include_tasks: tasks/fetch-java-version.yml
      vars:
        java_sdkman_major: "{{ _current_java_major }}"

    - name: Fetch Android cmdline-tools upstream version
      ansible.builtin.include_tasks: tasks/fetch-android-version.yml

    - name: Fetch Dolt upstream version
      ansible.builtin.include_tasks: tasks/fetch-github-release.yml
      vars:
        github_repo: "dolthub/dolt"

    - name: Save Dolt fetched tag
      ansible.builtin.set_fact:
        fetched_dolt_tag: "{{ fetched_github_tag }}"

    - name: Fetch OpenCode upstream version
      ansible.builtin.include_tasks: tasks/fetch-github-release.yml
      vars:
        github_repo: "anomalyco/opencode"

    - name: Save OpenCode fetched tag
      ansible.builtin.set_fact:
        fetched_opencode_tag: "{{ fetched_github_tag }}"

    # --- Apply updates to role defaults files ---

    # Flutter SDK: version and sha256 updated together
    - name: Update flutter_version in flutter role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/flutter/defaults/main.yml"
        regexp: 'flutter_version:\s*"[^"]+"'
        replace: 'flutter_version: "{{ fetched_flutter_version }}"'

    - name: Update flutter_sha256 in flutter role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/flutter/defaults/main.yml"
        regexp: 'flutter_sha256:\s*"[^"]+"'
        replace: 'flutter_sha256: "{{ fetched_flutter_sha256 }}"'

    # gitmux
    - name: Update tmux_gitmux_version in tmux role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/tmux/defaults/main.yml"
        regexp: 'tmux_gitmux_version:\s*"[^"]+"'
        replace: 'tmux_gitmux_version: "{{ fetched_gitmux_tag }}"'

    # Nerd Fonts (Hack)
    - name: Update nerd_font_version in nerd_font role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/nerd_font/defaults/main.yml"
        regexp: 'nerd_font_version:\s*"[^"]+"'
        replace: 'nerd_font_version: "{{ fetched_font_tag }}"'

    # Java (Temurin)
    - name: Update java_sdkman_identifier in java role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/java/defaults/main.yml"
        regexp: 'java_sdkman_identifier:\s*"[^"]+"'
        replace: 'java_sdkman_identifier: "{{ fetched_java_identifier }}"'

    # Android cmdline-tools: build number and sha1 updated together
    - name: Update android_cmdlinetools_build in android_studio role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/android_studio/defaults/main.yml"
        regexp: 'android_cmdlinetools_build:\s*"[^"]+"'
        replace: 'android_cmdlinetools_build: "{{ fetched_android_build }}"'

    - name: Update android_cmdlinetools_sha1 in android_studio role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/android_studio/defaults/main.yml"
        regexp: 'android_cmdlinetools_sha1:\s*"[^"]+"'
        replace: 'android_cmdlinetools_sha1: "{{ fetched_android_sha1 }}"'

    # Dolt
    - name: Update dolt_version in dolt_sql_server role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/dolt_sql_server/defaults/main.yml"
        regexp: 'dolt_version:\s*"[^"]+"'
        replace: 'dolt_version: "{{ fetched_dolt_tag }}"'

    - name: Download dolt amd64 tarball for sha256 computation
      ansible.builtin.get_url:
        url: "https://github.com/dolthub/dolt/releases/download/{{ fetched_dolt_tag }}/dolt-linux-amd64.tar.gz"
        dest: "/tmp/dolt-{{ fetched_dolt_tag }}-linux-amd64.tar.gz"
        mode: '0644'

    - name: Compute sha256 of dolt amd64 tarball
      ansible.builtin.stat:
        path: "/tmp/dolt-{{ fetched_dolt_tag }}-linux-amd64.tar.gz"
        checksum_algorithm: sha256
        get_checksum: true
      register: _dolt_amd64_stat

    - name: Update dolt_sha256_amd64 in dolt_sql_server role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/dolt_sql_server/defaults/main.yml"
        regexp: 'dolt_sha256_amd64:\s*"[^"]+"'
        replace: 'dolt_sha256_amd64: "{{ _dolt_amd64_stat.stat.checksum }}"'

    - name: Download dolt arm64 tarball for sha256 computation
      ansible.builtin.get_url:
        url: "https://github.com/dolthub/dolt/releases/download/{{ fetched_dolt_tag }}/dolt-linux-arm64.tar.gz"
        dest: "/tmp/dolt-{{ fetched_dolt_tag }}-linux-arm64.tar.gz"
        mode: '0644'

    - name: Compute sha256 of dolt arm64 tarball
      ansible.builtin.stat:
        path: "/tmp/dolt-{{ fetched_dolt_tag }}-linux-arm64.tar.gz"
        checksum_algorithm: sha256
        get_checksum: true
      register: _dolt_arm64_stat

    - name: Update dolt_sha256_arm64 in dolt_sql_server role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/dolt_sql_server/defaults/main.yml"
        regexp: 'dolt_sha256_arm64:\s*"[^"]+"'
        replace: 'dolt_sha256_arm64: "{{ _dolt_arm64_stat.stat.checksum }}"'

    - name: Update opencode_version in opencode role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/opencode/defaults/main.yml"
        regexp: 'opencode_version:\s*"[^"]+"'
        replace: 'opencode_version: "{{ fetched_opencode_tag }}"'

    - name: Download opencode linux-x64 tarball for sha256 computation
      ansible.builtin.get_url:
        url: "https://github.com/anomalyco/opencode/releases/download/{{ fetched_opencode_tag }}/opencode-linux-x64.tar.gz"
        dest: "/tmp/opencode-{{ fetched_opencode_tag }}-linux-x64.tar.gz"
        mode: '0644'

    - name: Compute sha256 of opencode linux-x64 tarball
      ansible.builtin.stat:
        path: "/tmp/opencode-{{ fetched_opencode_tag }}-linux-x64.tar.gz"
        checksum_algorithm: sha256
        get_checksum: true
      register: _opencode_amd64_stat

    - name: Update opencode_sha256_amd64 in opencode role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/opencode/defaults/main.yml"
        regexp: 'opencode_sha256_amd64:\s*"[^"]+"'
        replace: 'opencode_sha256_amd64: "{{ _opencode_amd64_stat.stat.checksum }}"'

    - name: Download opencode linux-arm64 tarball for sha256 computation
      ansible.builtin.get_url:
        url: "https://github.com/anomalyco/opencode/releases/download/{{ fetched_opencode_tag }}/opencode-linux-arm64.tar.gz"
        dest: "/tmp/opencode-{{ fetched_opencode_tag }}-linux-arm64.tar.gz"
        mode: '0644'

    - name: Compute sha256 of opencode linux-arm64 tarball
      ansible.builtin.stat:
        path: "/tmp/opencode-{{ fetched_opencode_tag }}-linux-arm64.tar.gz"
        checksum_algorithm: sha256
        get_checksum: true
      register: _opencode_arm64_stat

    - name: Update opencode_sha256_arm64 in opencode role defaults
      ansible.builtin.replace:
        path: "{{ _roles_dir }}/opencode/defaults/main.yml"
        regexp: 'opencode_sha256_arm64:\s*"[^"]+"'
        replace: 'opencode_sha256_arm64: "{{ _opencode_arm64_stat.stat.checksum }}"'
