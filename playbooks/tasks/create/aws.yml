# Algorithm:
# 1. Load AWS defaults (region, AMI, instance type, shared SSH key name) via
#    include_vars from the existing group_vars files (no duplication,
#    FR-013). No credential pre-check (FR-012) — AWS SDK errors surface on
#    the first amazon.aws module call below.
# 2. Load the AWS hostname pool and the current autogenerated inventory.
# 3. Pick the first hostname not yet in use; fail if the pool is exhausted
#    (FR-007), before any AWS API call.
# 4. Resolve image_id/instance_type/region from extra-vars with defaults.
# 5. block: ensure the shared ansible-sg security group exists; launch the
#    EC2 instance; remove any stale known_hosts entry for its public IP; wait
#    for SSH (accept-new, project-scoped known_hosts); write the new entry
#    into the autogenerated inventory; print the assigned hostname.
# On any failure inside the block after the instance was created: terminate
# the partially-created instance (rescue, FR-014) and fail with re-run
# instructions. The ansible-sg security group is left in place either way.
---
- name: Load AWS region default
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/group_vars/aws_ec2/vars.yml"

- name: Load AWS Linux AMI and instance-type defaults
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/group_vars/aws_ec2_linux/vars.yml"

- name: Load shared SSH key name
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/group_vars/all/vars.yml"

- name: Load AWS hostname pool
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/hostname_pool_aws.yml"

- name: Check if AWS autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/aws_autogenerated.yml"
  register: autogen_inv_stat

- name: Load AWS autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/aws_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      aws:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Set used hostnames from inventory
  ansible.builtin.set_fact:
    used_hostnames: "{{ current_inventory.all.hosts.keys() | list }}"

- name: Compute available AWS hostnames in pool order
  ansible.builtin.set_fact:
    available_hostnames: "{{ hostname_pool | reject('in', used_hostnames) | list }}"

- name: Fail if AWS hostname pool is exhausted
  ansible.builtin.fail:
    msg: >-
      AWS hostname pool exhausted. All names in
      playbooks/vars/hostname_pool_aws.yml are in use. Add more entries to
      that file to provision additional servers.
  when: available_hostnames | length == 0

- name: Set hostname to next available pool entry
  ansible.builtin.set_fact:
    hostname: "{{ available_hostnames | first }}"

- name: Resolve EC2 instance creation parameters
  ansible.builtin.set_fact:
    aws_resolved_region: "{{ aws_region | default(aws_default_region) }}"
    aws_resolved_image_id: "{{ aws_ami_id | default(aws_default_ami_id) }}"
    aws_resolved_instance_type: "{{ aws_instance_type | default(aws_default_instance_type) }}"

- name: Set aws known_hosts file path
  ansible.builtin.set_fact:
    aws_known_hosts_file: "{{ (playbook_dir + '/../inventories/aws_known_hosts') | realpath }}"

- block:
    - name: Ensure shared ansible-sg security group exists
      amazon.aws.ec2_security_group:
        name: ansible-sg
        description: "Security group for Ansible development environment"
        region: "{{ aws_resolved_region }}"
        state: present
        purge_rules: false
        rules: >-
          {{
            [{
              'proto': 'tcp',
              'ports': [22],
              'cidr_ip': '0.0.0.0/0',
              'rule_desc': 'SSH access from any IP (for Ansible and manual access)'
            }] + ([{
              'proto': 'tcp',
              'ports': [3389],
              'cidr_ip': '0.0.0.0/0',
              'rule_desc': 'RDP access from any IP (desktop-profile VMs only)'
            }] if profile == 'desktop' else [])
          }}

    - name: Create EC2 instance
      amazon.aws.ec2_instance:
        state: present
        name: "{{ hostname }}"
        image_id: "{{ aws_resolved_image_id }}"
        instance_type: "{{ aws_resolved_instance_type }}"
        region: "{{ aws_resolved_region }}"
        key_name: "{{ my_ssh_key_name }}"
        security_groups:
          - ansible-sg
        wait: true
      register: aws_instance_result

    - name: Set new instance facts
      ansible.builtin.set_fact:
        aws_instance_ip: "{{ aws_instance_result.instances[0].public_ip_address }}"
        aws_instance_id: "{{ aws_instance_result.instances[0].instance_id }}"

    - name: Check for stale known_hosts entry for new instance IP
      ansible.builtin.command:
        cmd: "ssh-keygen -f {{ aws_known_hosts_file }} -F {{ aws_instance_ip }}"
      register: aws_known_hosts_check
      failed_when: false
      changed_when: false

    - name: Remove stale known_hosts entry for new instance IP
      ansible.builtin.command:
        cmd: "ssh-keygen -f {{ aws_known_hosts_file }} -R {{ aws_instance_ip }}"
      when: aws_known_hosts_check.stdout | trim | length > 0
      failed_when: false
      changed_when: true

    - name: Wait for SSH on new EC2 instance
      ansible.builtin.wait_for_connection:
        timeout: 180
        delay: 5
      delegate_to: "{{ aws_instance_ip }}"
      vars:
        ansible_port: 22
        ansible_user: ubuntu
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile={{ hostvars[inventory_hostname]['aws_known_hosts_file'] }}"

    - name: Build updated inventory with new host
      ansible.builtin.set_fact:
        updated_inventory: >-
          {{
            current_inventory | combine({
              'all': {
                'hosts': (current_inventory.all.hosts | default({})) | combine({
                  hostname: {
                    'ansible_host': aws_instance_ip,
                    'ansible_port': 22,
                    'ansible_user': 'ubuntu',
                    'ansible_ssh_common_args': '-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=' + aws_known_hosts_file,
                    'aws_instance_id': aws_instance_id
                  }
                })
              },
              'linux': {
                'hosts': (current_inventory.linux.hosts | default({})) | combine({hostname: {}})
              },
              'aws': {
                'hosts': (current_inventory.aws.hosts | default({})) | combine({hostname: {}})
              },
              profile: {
                'hosts': ((current_inventory[profile] | default({})).hosts | default({})) | combine({hostname: {}})
              }
            }, recursive=true)
          }}

    - name: Write AWS autogenerated inventory
      ansible.builtin.copy:
        content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ updated_inventory | to_nice_yaml(indent=2) }}"
        dest: "{{ playbook_dir }}/../inventories/aws_autogenerated.yml"
        mode: "0644"

    - name: Print assigned hostname
      ansible.builtin.debug:
        msg: "VM created with hostname: {{ hostname }}"

  rescue:
    - name: Terminate partially-created EC2 instance on failure
      amazon.aws.ec2_instance:
        state: absent
        instance_ids:
          - "{{ aws_instance_result.instances[0].instance_id }}"
        region: "{{ aws_resolved_region }}"
      failed_when: false
      when: aws_instance_result is defined and aws_instance_result.instances | default([]) | length > 0

    - name: Fail with rollback message
      ansible.builtin.fail:
        msg: >-
          Instance creation failed for '{{ hostname }}'. The partially-created
          EC2 instance has been terminated. Re-run
          create-vm.yml -e provider=aws to retry.
