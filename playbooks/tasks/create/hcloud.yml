# Algorithm:
# 1. Load hcloud defaults (location, server type, shared SSH key name) via
#    include_vars from the existing group_vars files (no duplication,
#    FR-013); read HCLOUD_TOKEN from the environment and fail loudly if empty
#    (FR-012), before consuming a hostname from the pool.
# 2. Load the hcloud hostname pool and the current autogenerated inventory.
# 3. Pick the first hostname not yet in use; fail if the pool is exhausted
#    (FR-007), before any Hetzner Cloud API call.
# 4. Resolve server_type/location/image from extra-vars with defaults.
# 5. block: create the server via hetzner.hcloud.server; remove any stale
#    known_hosts entry for its IP; wait for SSH (accept-new, project-scoped
#    known_hosts); write the new entry into the autogenerated inventory;
#    print the assigned hostname.
# On any failure inside the block: delete the partially-created server
# (rescue, FR-014) and fail with re-run instructions.
---
- name: Load hcloud location default
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/group_vars/hcloud/vars.yml"

- name: Load hcloud Linux server-type default
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/group_vars/hcloud_linux/vars.yml"

- name: Load shared SSH key name
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/group_vars/all/vars.yml"

- name: Read Hetzner Cloud API token from environment
  ansible.builtin.set_fact:
    hcloud_token: "{{ lookup('env', 'HCLOUD_TOKEN') }}"

- name: Assert HCLOUD_TOKEN is set
  ansible.builtin.assert:
    that: hcloud_token | length > 0
    fail_msg: >-
      Environment variable HCLOUD_TOKEN is not set or empty. Export
      HCLOUD_TOKEN with a valid Hetzner Cloud API token before running
      create-vm.yml -e provider=hcloud.

- name: Load Hetzner Cloud hostname pool
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/hostname_pool_hcloud.yml"

- name: Check if Hetzner Cloud autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/hcloud_autogenerated.yml"
  register: autogen_inv_stat

- name: Load Hetzner Cloud autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/hcloud_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      hcloud:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Set used hostnames from inventory
  ansible.builtin.set_fact:
    used_hostnames: "{{ current_inventory.all.hosts.keys() | list }}"

- name: Compute available Hetzner Cloud hostnames in pool order
  ansible.builtin.set_fact:
    available_hostnames: "{{ hostname_pool | reject('in', used_hostnames) | list }}"

- name: Fail if Hetzner Cloud hostname pool is exhausted
  ansible.builtin.fail:
    msg: >-
      Hetzner Cloud hostname pool exhausted. All names in
      playbooks/vars/hostname_pool_hcloud.yml are in use. Add more entries to
      that file to provision additional servers.
  when: available_hostnames | length == 0

- name: Set hostname to next available pool entry
  ansible.builtin.set_fact:
    hostname: "{{ available_hostnames | first }}"

- name: Resolve Hetzner Cloud server creation parameters
  ansible.builtin.set_fact:
    hcloud_resolved_server_type: "{{ hcloud_server_type | default(hcloud_default_type) }}"
    hcloud_resolved_location: "{{ hcloud_server_location | default(hcloud_default_location) }}"
    hcloud_resolved_image: "{{ image | default('ubuntu-24.04') }}"

- name: Set hcloud known_hosts file path
  ansible.builtin.set_fact:
    hcloud_known_hosts_file: "{{ (playbook_dir + '/../inventories/hcloud_known_hosts') | realpath }}"

- block:
    - name: Create Hetzner Cloud server
      hetzner.hcloud.server:
        state: present
        name: "{{ hostname }}"
        server_type: "{{ hcloud_resolved_server_type }}"
        location: "{{ hcloud_resolved_location }}"
        image: "{{ hcloud_resolved_image }}"
        ssh_keys:
          - "{{ my_ssh_key_name }}"
        api_token: "{{ hcloud_token }}"
      register: hcloud_server_result

    - name: Set new server IP fact
      ansible.builtin.set_fact:
        hcloud_server_ip: "{{ hcloud_server_result.hcloud_server.ipv4_address }}"

    - name: Check for stale known_hosts entry for new server IP
      ansible.builtin.command:
        cmd: "ssh-keygen -f {{ hcloud_known_hosts_file }} -F {{ hcloud_server_ip }}"
      register: hcloud_known_hosts_check
      failed_when: false
      changed_when: false

    - name: Remove stale known_hosts entry for new server IP
      ansible.builtin.command:
        cmd: "ssh-keygen -f {{ hcloud_known_hosts_file }} -R {{ hcloud_server_ip }}"
      when: hcloud_known_hosts_check.stdout | trim | length > 0
      failed_when: false
      changed_when: true

    - name: Wait for SSH on new Hetzner Cloud server
      ansible.builtin.wait_for_connection:
        timeout: 180
        delay: 5
      delegate_to: "{{ hcloud_server_ip }}"
      vars:
        ansible_port: 22
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile={{ hcloud_known_hosts_file }}"

    - name: Build updated inventory with new host
      ansible.builtin.set_fact:
        updated_inventory: >-
          {{
            current_inventory | combine({
              'all': {
                'hosts': (current_inventory.all.hosts | default({})) | combine({
                  hostname: {
                    'ansible_host': hcloud_server_ip,
                    'ansible_port': 22,
                    'ansible_user': 'root',
                    'ansible_ssh_common_args': '-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=' + hcloud_known_hosts_file
                  }
                })
              },
              'linux': {
                'hosts': (current_inventory.linux.hosts | default({})) | combine({hostname: {}})
              },
              'hcloud': {
                'hosts': (current_inventory.hcloud.hosts | default({})) | combine({hostname: {}})
              }
            }, recursive=true)
          }}

    - name: Write Hetzner Cloud autogenerated inventory
      ansible.builtin.copy:
        content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ updated_inventory | to_nice_yaml(indent=2) }}"
        dest: "{{ playbook_dir }}/../inventories/hcloud_autogenerated.yml"
        mode: "0644"

    - name: Print assigned hostname
      ansible.builtin.debug:
        msg: "VM created with hostname: {{ hostname }}"

  rescue:
    - name: Delete partially-created Hetzner Cloud server on failure
      hetzner.hcloud.server:
        state: absent
        name: "{{ hostname }}"
        api_token: "{{ hcloud_token }}"
      failed_when: false

    - name: Fail with rollback message
      ansible.builtin.fail:
        msg: >-
          Server creation failed for '{{ hostname }}'. The partially-created
          Hetzner Cloud server has been deleted. Re-run
          create-vm.yml -e provider=hcloud to retry.
