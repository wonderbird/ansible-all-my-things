# Algorithm:
# 1. Load hostname pool and current autogenerated inventory.
# 2. Pick the first hostname not yet in use.
# 3. Build ansible-vm-docker:latest if it doesn't exist yet (build-once guard).
# 4. Run a new privileged systemd container with a dynamically published SSH
#    port.
# 5. Discover the published port via docker port; wait for SSH.
# 6. Write container connection details and credentials into autogenerated
#    inventory.
# On any failure after container start: docker stop + docker rm + fail (rescue).
---
- name: Load Docker hostname pool
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/hostname_pool_docker.yml"

- name: Load Docker root credentials
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/docker_credentials.yml"

- name: Assert Docker root password is non-empty
  ansible.builtin.assert:
    that: docker_root_password | length > 0
    fail_msg: >-
      docker_root_password is empty. Check playbooks/vars/docker_credentials.yml.

- name: Check if Docker autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/docker_autogenerated.yml"
  register: autogen_inv_stat

- name: Load Docker autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/docker_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      docker:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Set used hostnames from inventory
  ansible.builtin.set_fact:
    used_hostnames: "{{ current_inventory.all.hosts.keys() | list }}"

- name: Fail if Docker hostname pool is exhausted
  ansible.builtin.fail:
    msg: >-
      Docker hostname pool exhausted. All names in
      playbooks/vars/hostname_pool_docker.yml are in use. Add more entries to
      that file to provision additional containers.
  when: (hostname_pool | difference(used_hostnames)) | length == 0

- name: Set hostname to next available pool entry
  ansible.builtin.set_fact:
    hostname: "{{ (hostname_pool | difference(used_hostnames)) | first }}"

- name: Check whether the Docker image already exists
  ansible.builtin.command:
    cmd: docker image inspect ansible-vm-docker:latest
  register: docker_image_check
  changed_when: false
  failed_when: false

- name: Build the Docker image if it does not exist
  ansible.builtin.command:
    cmd: >-
      docker build
      -t ansible-vm-docker:latest
      --build-arg DOCKER_ROOT_PASSWORD={{ docker_root_password }}
      {{ playbook_dir }}/files/docker
  when: docker_image_check.rc != 0
  changed_when: true

- name: Check sshpass is installed
  ansible.builtin.shell:
    cmd: command -v sshpass
  changed_when: false
  failed_when: false
  register: sshpass_check

- name: Fail if sshpass is not installed
  ansible.builtin.fail:
    msg: >-
      sshpass is required for ansible_ssh_pass authentication but is not installed.
      Install with: apt-get install sshpass
  when: sshpass_check.rc != 0

- block:
    - name: Set Docker container resource defaults
      ansible.builtin.set_fact:
        docker_vm_cpus: "{{ docker_vm_cpus | default(2) }}"
        docker_vm_memory: "{{ docker_vm_memory | default('4g') }}"

    - name: Run Docker container
      ansible.builtin.command:
        cmd: >-
          docker run
          -d
          --privileged
          --name {{ hostname }}
          --hostname {{ hostname }}
          --cpus {{ docker_vm_cpus }}
          --memory {{ docker_vm_memory }}
          -p 127.0.0.1::22
          ansible-vm-docker:latest
      changed_when: true

    # The container was started with '-p 127.0.0.1::22' (no host port given),
    # so Docker picked a free host port and mapped it to container port 22.
    # 'docker port <name> 22/tcp' returns e.g. '127.0.0.1:54321'; strip
    # everything up to the last ':' to get the host port number.
    - name: Discover published SSH port
      ansible.builtin.command:
        cmd: "docker port {{ hostname }} 22/tcp"
      register: docker_port_result
      changed_when: false

    - name: Set discovered SSH port fact
      ansible.builtin.set_fact:
        docker_ssh_port: "{{ docker_port_result.stdout | trim | regex_replace('^.*:', '') }}"

    - name: Assert discovered SSH port is valid
      ansible.builtin.assert:
        that:
          - docker_ssh_port | length > 0
          - docker_ssh_port is match('^[0-9]+$')
        fail_msg: >-
          Could not parse a published SSH port from
          'docker port {{ hostname }} 22/tcp' output:
          '{{ docker_port_result.stdout }}'.

    - name: Wait for SSH on container
      ansible.builtin.wait_for_connection:
        timeout: 120
        delay: 2
      delegate_to: 127.0.0.1
      vars:
        ansible_port: "{{ docker_ssh_port }}"
        ansible_user: root
        ansible_ssh_pass: "{{ docker_root_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Build updated inventory with new host
      ansible.builtin.set_fact:
        updated_inventory: >-
          {{
            current_inventory | combine({
              'all': {
                'hosts': (current_inventory.all.hosts | default({})) | combine({
                  hostname: {
                    'ansible_host': '127.0.0.1',
                    'ansible_port': docker_ssh_port | int,
                    'ansible_user': 'root',
                    'ansible_ssh_pass': docker_root_password,
                    'ansible_ssh_common_args': '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
                  }
                })
              },
              'linux': {
                'hosts': (current_inventory.linux.hosts | default({})) | combine({hostname: {}})
              },
              'docker': {
                'hosts': (current_inventory.docker.hosts | default({})) | combine({hostname: {}})
              }
            }, recursive=true)
          }}

    - name: Write Docker autogenerated inventory
      ansible.builtin.copy:
        content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ updated_inventory | to_nice_yaml(indent=2) }}"
        dest: "{{ playbook_dir }}/../inventories/docker_autogenerated.yml"
        mode: "0644"

    - name: Print assigned hostname
      ansible.builtin.debug:
        msg: "VM created with hostname: {{ hostname }}"

  rescue:
    - name: Stop container on failure
      ansible.builtin.command:
        cmd: "docker stop {{ hostname }}"
      failed_when: false

    - name: Remove container on failure
      ansible.builtin.command:
        cmd: "docker rm {{ hostname }}"
      failed_when: false

    - name: Fail with rollback message
      ansible.builtin.fail:
        msg: >-
          Container creation failed for '{{ hostname }}'. Partial container
          state has been cleaned up (docker stop + docker rm). Re-run
          create-vm.yml -e provider=docker to retry.
