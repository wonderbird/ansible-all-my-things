# Algorithm:
# 1. Load hostname pool and current autogenerated inventory.
# 2. Pick the first hostname not yet in use.
# 3. Clone OCI image with tart clone; configure CPU/memory/disk with tart set.
# 4. Start VM with tart run in background (skip if already running).
# 5. Poll tart ip until VM gets DHCP address; wait_for port 22.
# 6. Write VM IP and credentials into autogenerated inventory.
# On any failure after VM clone: tart stop + tart delete + fail (rescue).
---
- name: Load hostname pool
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/hostname_pool_tart.yml"

- name: Load VM credentials
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/tart_credentials.yml"

- name: Assert VM admin password is non-empty
  ansible.builtin.assert:
    that: tart_admin_password | length > 0
    fail_msg: >-
      tart_admin_password is empty. Check playbooks/vars/tart_credentials.yml.

- name: Check sshpass is installed
  ansible.builtin.shell:
    cmd: command -v sshpass
  changed_when: false
  failed_when: false
  register: sshpass_check

- name: Fail if sshpass is not installed
  ansible.builtin.fail:
    msg: >-
      sshpass is required for ansible_ssh_pass authentication but is not installed.
      Install with: brew install sshpass
  when: sshpass_check.rc != 0

- name: Check if autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/tart_autogenerated.yml"
  register: autogen_inv_stat

- name: Load autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/tart_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      tart:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Set used hostnames from inventory
  ansible.builtin.set_fact:
    used_hostnames: "{{ current_inventory.all.hosts.keys() | list }}"

- name: Fail if hostname pool is exhausted
  ansible.builtin.fail:
    msg: >-
      Hostname pool exhausted. All names in playbooks/vars/hostname_pool_tart.yml are
      in use. Add more entries to that file to provision additional VMs.
  when: (hostname_pool | difference(used_hostnames)) | length == 0

- name: Set hostname to next available pool entry
  ansible.builtin.set_fact:
    hostname: "{{ (hostname_pool | difference(used_hostnames)) | first }}"

- block:
    - name: Clone VM from OCI image
      ansible.builtin.command:
        cmd: "tart clone ghcr.io/cirruslabs/ubuntu:24.04 {{ hostname }}"
        creates: "{{ ansible_facts['env']['HOME'] }}/.tart/vms/{{ hostname }}"

    - name: Get VM running state
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          tart list --format json |
          python3 -c "import sys, json; data = json.load(sys.stdin);
          print('running' if any(v.get('Name') == '{{ hostname }}' and
          v.get('State') == 'Running' for v in data) else 'stopped')"
        executable: /bin/bash
      register: vm_state
      changed_when: false

    - name: Configure VM CPU, memory, and disk
      ansible.builtin.command:
        cmd: "tart set {{ hostname }} --cpu {{ vm_cpus }} --memory {{ vm_memory_mb }} --disk-size {{ vm_disk_size_gb }}"
      when: vm_state.stdout | trim != 'running'
      changed_when: true

    - name: Start VM in background
      ansible.builtin.shell:
        cmd: "nohup tart run {{ hostname }} --no-graphics </dev/null >/dev/null 2>&1 &"
      when: vm_state.stdout | trim != 'running'
      changed_when: true

    - name: Retrieve VM IP via tart ip
      ansible.builtin.command:
        cmd: "tart ip {{ hostname }}"
      register: vm_ip_result
      changed_when: false
      until: vm_ip_result.rc == 0 and vm_ip_result.stdout | trim | length > 0
      retries: 30
      delay: 10

    - name: Assert VM IP address was retrieved
      ansible.builtin.assert:
        that: vm_ip_result.stdout | trim | length > 0
        fail_msg: >-
          Could not retrieve IP address for VM '{{ hostname }}' via
          'tart ip {{ hostname }}'. Verify the VM started and network is up.

    - name: Set VM IP fact
      ansible.builtin.set_fact:
        vm_ip: "{{ vm_ip_result.stdout | trim }}"

    - name: Wait for SSH on VM
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 5
      delegate_to: "{{ vm_ip }}"
      vars:
        ansible_user: admin
        ansible_ssh_pass: "{{ hostvars[inventory_hostname]['tart_admin_password'] }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Build updated inventory with new host
      ansible.builtin.set_fact:
        updated_inventory: >-
          {{
            current_inventory | combine({
              'all': {
                'hosts': (current_inventory.all.hosts | default({})) | combine({
                  hostname: {
                    'ansible_host': vm_ip,
                    'ansible_port': 22,
                    'ansible_user': 'admin',
                    'ansible_ssh_pass': tart_admin_password,
                    'ansible_ssh_common_args': '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
                  }
                })
              },
              'linux': {
                'hosts': (current_inventory.linux.hosts | default({})) | combine({hostname: {}})
              },
              'tart': {
                'hosts': (current_inventory.tart.hosts | default({})) | combine({hostname: {}})
              }
            }, recursive=true)
          }}

    - name: Write autogenerated inventory
      ansible.builtin.copy:
        content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ updated_inventory | to_nice_yaml(indent=2) }}"
        dest: "{{ playbook_dir }}/../inventories/tart_autogenerated.yml"
        mode: "0644"

    - name: Print assigned hostname
      ansible.builtin.debug:
        msg: "VM created with hostname: {{ hostname }}"

  rescue:
    - name: Stop VM on failure
      ansible.builtin.command:
        cmd: "tart stop {{ hostname }}"
      failed_when: false

    - name: Delete VM on failure
      ansible.builtin.command:
        cmd: "tart delete {{ hostname }}"
      failed_when: false

    - name: Fail with rollback message
      ansible.builtin.fail:
        msg: >-
          VM creation failed for '{{ hostname }}'. Partial VM state has been
          cleaned up (tart stop + tart delete). Re-run create-vm.yml to retry.
