# Algorithm:
# 1. Load hostname pool and current autogenerated inventory.
# 2. Pick the first hostname not yet in use.
# 3. Create VM directory, render Vagrantfile, run `vagrant up`.
# 4. Retrieve the VM IP via `vagrant ssh-config`, update the autogenerated inventory.
---
- name: Load hostname pool
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/hostname_pool.yml"

- name: Check if autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/vagrant_tart_autogenerated.yml"
  register: autogen_inv_stat

- name: Load autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/vagrant_tart_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      vagrant_tart:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Set used hostnames from inventory
  ansible.builtin.set_fact:
    used_hostnames: "{{ current_inventory.all.hosts.keys() | list }}"

- name: Fail if hostname pool is exhausted
  ansible.builtin.fail:
    msg: >-
      Hostname pool exhausted. All names in playbooks/vars/hostname_pool.yml are
      in use. Add more entries to that file to provision additional VMs.
  when: (hostname_pool | difference(used_hostnames)) | length == 0

- name: Set hostname to next available pool entry
  ansible.builtin.set_fact:
    hostname: "{{ (hostname_pool | difference(used_hostnames)) | first }}"

- name: Set VM directory path
  ansible.builtin.set_fact:
    vm_dir: "{{ ansible_env.HOME }}/.local/share/ansible-vms/{{ hostname }}"

- name: Create VM directory
  ansible.builtin.file:
    path: "{{ vm_dir }}"
    state: directory
    mode: "0755"

- name: Render Vagrantfile from template
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/Vagrantfile.j2"
    dest: "{{ vm_dir }}/Vagrantfile"
    mode: "0644"

- name: Start VM with vagrant up
  ansible.builtin.shell:
    cmd: vagrant up
    chdir: "{{ vm_dir }}"
    creates: "{{ vm_dir }}/.vagrant/machines/{{ hostname }}/tart/private_key"

- name: Retrieve VM IP address
  ansible.builtin.shell:
    cmd: "vagrant ssh-config {{ hostname }} | grep HostName | awk '{print $2}'"
    chdir: "{{ vm_dir }}"
  register: vm_ip_result
  changed_when: false

- name: Assert VM IP address was retrieved
  ansible.builtin.assert:
    that: vm_ip_result.stdout | trim | length > 0
    fail_msg: >-
      Could not retrieve IP address for VM '{{ hostname }}' via
      'vagrant ssh-config {{ hostname }}'. Verify the VM started successfully.

- name: Set VM IP fact
  ansible.builtin.set_fact:
    vm_ip: "{{ vm_ip_result.stdout | trim }}"

- name: Build updated inventory with new host
  ansible.builtin.set_fact:
    updated_inventory: >-
      {{
        current_inventory | combine({
          'all': {
            'hosts': (current_inventory.all.hosts | default({})) | combine({
              hostname: {
                'ansible_host': vm_ip,
                'ansible_port': 22,
                'ansible_user': 'admin',
                'ansible_ssh_private_key_file': vm_dir ~ '/.vagrant/machines/' ~ hostname ~ '/tart/private_key'
              }
            })
          },
          'linux': {
            'hosts': (current_inventory.linux.hosts | default({})) | combine({hostname: {}})
          },
          'vagrant_tart': {
            'hosts': (current_inventory.vagrant_tart.hosts | default({})) | combine({hostname: {}})
          }
        }, recursive=true)
      }}

- name: Write autogenerated inventory
  ansible.builtin.copy:
    content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ updated_inventory | to_nice_yaml(indent=2) }}"
    dest: "{{ playbook_dir }}/../inventories/vagrant_tart_autogenerated.yml"
    mode: "0644"

- name: Print assigned hostname
  ansible.builtin.debug:
    msg: "VM created with hostname: {{ hostname }}"
