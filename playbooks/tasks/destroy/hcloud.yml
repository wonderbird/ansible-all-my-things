# Algorithm:
# 1. `hostname` is already asserted defined/non-empty by destroy-vm.yml's
#    shared pre_task.
# 2. Check if the autogenerated inventory exists; load it if present, else
#    init empty.
# 3. Fail loudly if hostname is absent from inventory (unknown hostname),
#    before any Hetzner Cloud action.
# 4. Capture ansible_host (the server's IP) for hostname before it is
#    removed, for the known_hosts cleanup.
# 5. Read HCLOUD_TOKEN from the environment and fail loudly if empty.
# 6. Check server existence via hetzner.hcloud.server_info; delete it if
#    present, else warn that the inventory entry is stale and skip deletion.
# 7. Idempotent known_hosts cleanup for the captured IP (both paths).
# 8. Remove the hostname from the autogenerated inventory and write it back.
---
- name: Check if Hetzner Cloud autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/hcloud_autogenerated.yml"
  register: autogen_inv_stat

- name: Load Hetzner Cloud autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/hcloud_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      hcloud:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Fail if hostname is not present in Hetzner Cloud inventory
  ansible.builtin.fail:
    msg: >-
      Hostname '{{ hostname }}' is not present in
      inventories/hcloud_autogenerated.yml. Nothing to destroy.
  when: hostname not in (current_inventory.all.hosts | default({}))

- name: Capture server IP for known_hosts cleanup
  ansible.builtin.set_fact:
    hcloud_server_ip: "{{ current_inventory.all.hosts[hostname].ansible_host }}"

- name: Set hcloud known_hosts file path
  ansible.builtin.set_fact:
    hcloud_known_hosts_file: "{{ (playbook_dir + '/../inventories/hcloud_known_hosts') | realpath }}"

- name: Read Hetzner Cloud API token from environment
  ansible.builtin.set_fact:
    hcloud_token: "{{ lookup('env', 'HCLOUD_TOKEN') }}"

- name: Assert HCLOUD_TOKEN is set
  ansible.builtin.assert:
    that: hcloud_token | length > 0
    fail_msg: >-
      Environment variable HCLOUD_TOKEN is not set or empty. Export
      HCLOUD_TOKEN with a valid Hetzner Cloud API token before running
      destroy-vm.yml -e provider=hcloud.

- name: Check if Hetzner Cloud server exists
  hetzner.hcloud.server_info:
    name: "{{ hostname }}"
    api_token: "{{ hcloud_token }}"
  register: hcloud_server_info

- name: Warn if server is absent from Hetzner Cloud (stale inventory entry)
  ansible.builtin.debug:
    msg: >-
      WARNING: Server '{{ hostname }}' does not exist in Hetzner Cloud but is
      present in inventory. Proceeding with inventory cleanup only.
  when: hcloud_server_info.hcloud_server_info | length == 0

- name: Delete Hetzner Cloud server
  hetzner.hcloud.server:
    state: absent
    name: "{{ hostname }}"
    api_token: "{{ hcloud_token }}"
  when: hcloud_server_info.hcloud_server_info | length > 0

- name: Check for known_hosts entry for destroyed server IP
  ansible.builtin.command:
    cmd: "ssh-keygen -f {{ hcloud_known_hosts_file }} -F {{ hcloud_server_ip }}"
  register: hcloud_known_hosts_check
  failed_when: false
  changed_when: false

- name: Remove known_hosts entry for destroyed server IP
  ansible.builtin.command:
    cmd: "ssh-keygen -f {{ hcloud_known_hosts_file }} -R {{ hcloud_server_ip }}"
  when: hcloud_known_hosts_check.stdout | trim | length > 0
  failed_when: false
  changed_when: true

- name: Build cleaned inventory without destroyed host
  ansible.builtin.set_fact:
    cleaned_inventory: >-
      {{
        {
          'all': {
            'hosts': (current_inventory.all.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'linux': {
            'hosts': (current_inventory.linux.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'hcloud': {
            'hosts': (current_inventory.hcloud.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          }
        }
      }}

- name: Write cleaned Hetzner Cloud inventory
  ansible.builtin.copy:
    content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ cleaned_inventory | to_nice_yaml(indent=2) }}"
    dest: "{{ playbook_dir }}/../inventories/hcloud_autogenerated.yml"
    mode: "0644"

- name: Assert hostname removed from Hetzner Cloud inventory
  ansible.builtin.assert:
    that: hostname not in (cleaned_inventory.all.hosts | default({}))
    fail_msg: "Failed to remove '{{ hostname }}' from inventories/hcloud_autogenerated.yml"
