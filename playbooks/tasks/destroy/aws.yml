# Algorithm:
# 1. `hostname` is already asserted defined/non-empty by destroy-vm.yml's
#    shared pre_task.
# 2. Check if the autogenerated inventory exists; load it if present, else
#    init empty.
# 3. Fail loudly if hostname is absent from inventory (unknown hostname),
#    before any AWS action.
# 4. Capture ansible_host (the instance's public IP) and aws_instance_id for
#    hostname before the entry is removed.
# 5. Load the AWS region default; check the instance's current state via
#    amazon.aws.ec2_instance_info; terminate it if present and not already
#    terminated, else warn that the inventory entry is stale and skip
#    termination.
# 6. Idempotent known_hosts cleanup for the captured IP (both paths).
# 7. Remove the hostname from the autogenerated inventory and write it back.
# The shared ansible-sg security group is left untouched (FR-013).
---
- name: Check if AWS autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/aws_autogenerated.yml"
  register: autogen_inv_stat

- name: Load AWS autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/aws_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      aws:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Fail if hostname is not present in AWS inventory
  ansible.builtin.fail:
    msg: >-
      Hostname '{{ hostname }}' is not present in
      inventories/aws_autogenerated.yml. Nothing to destroy.
  when: hostname not in (current_inventory.all.hosts | default({}))

- name: Capture instance details for cleanup
  ansible.builtin.set_fact:
    aws_instance_ip: "{{ current_inventory.all.hosts[hostname].ansible_host }}"
    aws_instance_id: "{{ current_inventory.all.hosts[hostname].aws_instance_id }}"

- name: Set aws known_hosts file path
  ansible.builtin.set_fact:
    aws_known_hosts_file: "{{ (playbook_dir + '/../inventories/aws_known_hosts') | realpath }}"

- name: Load AWS region default
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/vars/aws_defaults.yml"

- name: Resolve AWS region
  ansible.builtin.set_fact:
    aws_resolved_region: "{{ aws_region | default(aws_default_region) }}"

- name: Check current state of EC2 instance
  amazon.aws.ec2_instance_info:
    instance_ids:
      - "{{ aws_instance_id }}"
    region: "{{ aws_resolved_region }}"
  register: aws_instance_info
  failed_when: false

- name: Determine whether EC2 instance is still present
  ansible.builtin.set_fact:
    aws_instance_still_present: >-
      {{
        (aws_instance_info.instances | default([]) | length > 0) and
        (aws_instance_info.instances[0].state.name not in ['terminated', 'shutting-down'])
      }}

- name: Warn if instance is absent from AWS (stale inventory entry)
  ansible.builtin.debug:
    msg: >-
      WARNING: EC2 instance '{{ aws_instance_id }}' for hostname '{{ hostname }}'
      does not exist or is already terminated in AWS but is present in
      inventory. Proceeding with inventory cleanup only.
  when: not aws_instance_still_present

- name: Terminate EC2 instance
  amazon.aws.ec2_instance:
    state: absent
    instance_ids:
      - "{{ aws_instance_id }}"
    region: "{{ aws_resolved_region }}"
    wait: true
  when: aws_instance_still_present

- name: Check for known_hosts entry for destroyed instance IP
  ansible.builtin.command:
    cmd: "ssh-keygen -f {{ aws_known_hosts_file }} -F {{ aws_instance_ip }}"
  register: aws_known_hosts_check
  failed_when: false
  changed_when: false

- name: Remove known_hosts entry for destroyed instance IP
  ansible.builtin.command:
    cmd: "ssh-keygen -f {{ aws_known_hosts_file }} -R {{ aws_instance_ip }}"
  when: aws_known_hosts_check.stdout | trim | length > 0
  failed_when: false
  changed_when: true

- name: Build cleaned inventory without destroyed host
  ansible.builtin.set_fact:
    cleaned_inventory: >-
      {{
        {
          'all': {
            'hosts': (current_inventory.all.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'linux': {
            'hosts': (current_inventory.linux.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'aws': {
            'hosts': (current_inventory.aws.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'basic': {
            'hosts': ((current_inventory.basic | default({})).hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'desktop': {
            'hosts': ((current_inventory.desktop | default({})).hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'windows': {
            'hosts': ((current_inventory.windows | default({})).hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          }
        }
      }}

- name: Write cleaned AWS inventory
  ansible.builtin.copy:
    content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ cleaned_inventory | to_nice_yaml(indent=2) }}"
    dest: "{{ playbook_dir }}/../inventories/aws_autogenerated.yml"
    mode: "0644"

- name: Assert hostname removed from AWS inventory
  ansible.builtin.assert:
    that: hostname not in (cleaned_inventory.all.hosts | default({}))
    fail_msg: "Failed to remove '{{ hostname }}' from inventories/aws_autogenerated.yml"
