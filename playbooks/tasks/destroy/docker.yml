# Algorithm:
# 1. Assert required variable `hostname` is provided.
# 2. Check if autogenerated inventory exists; load it if present, else init empty.
# 3. Fail loudly if hostname is absent from inventory (unknown hostname).
# 4. Check container existence via docker container inspect; stop+rm if
#    present, warn+skip if absent (stale entry).
# 5. Remove the hostname from the autogenerated inventory and write it back.
---
- name: Assert hostname variable is defined
  ansible.builtin.assert:
    that: hostname is defined and hostname | length > 0
    fail_msg: >-
      Required variable 'hostname' is not defined.
      Run: ansible-playbook playbooks/destroy-vm.yml -e provider=docker -e hostname=<name>

- name: Check if Docker autogenerated inventory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventories/docker_autogenerated.yml"
  register: autogen_inv_stat

- name: Load Docker autogenerated inventory
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../inventories/docker_autogenerated.yml"
    name: current_inventory
  when: autogen_inv_stat.stat.exists

- name: Initialize empty inventory when autogenerated file is absent
  ansible.builtin.set_fact:
    current_inventory:
      all:
        hosts: {}
      linux:
        hosts: {}
      docker:
        hosts: {}
  when: not autogen_inv_stat.stat.exists

- name: Fail if hostname is not present in Docker inventory
  ansible.builtin.fail:
    msg: >-
      Hostname '{{ hostname }}' is not present in
      inventories/docker_autogenerated.yml. Nothing to destroy.
  when: hostname not in (current_inventory.all.hosts | default({}))

- name: Check if container exists in Docker
  ansible.builtin.command:
    cmd: "docker container inspect {{ hostname }}"
  register: docker_container_check
  changed_when: false
  failed_when: false

- name: Warn if container is absent from Docker (stale inventory entry)
  ansible.builtin.debug:
    msg: >-
      WARNING: Container '{{ hostname }}' does not exist in Docker but is
      present in inventory. Proceeding with inventory cleanup only.
  when: docker_container_check.rc != 0

- name: Stop container
  ansible.builtin.command:
    cmd: "docker stop {{ hostname }}"
  when: docker_container_check.rc == 0
  changed_when: true

- name: Remove container
  ansible.builtin.command:
    cmd: "docker rm {{ hostname }}"
  when: docker_container_check.rc == 0
  changed_when: true

- name: Build cleaned inventory without destroyed host
  ansible.builtin.set_fact:
    cleaned_inventory: >-
      {{
        {
          'all': {
            'hosts': (current_inventory.all.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'linux': {
            'hosts': (current_inventory.linux.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          },
          'docker': {
            'hosts': (current_inventory.docker.hosts | default({}) | dict2items
                      | selectattr('key', '!=', hostname) | list | items2dict)
          }
        }
      }}

- name: Write cleaned Docker inventory
  ansible.builtin.copy:
    content: "# AUTO-GENERATED — do not edit manually. Overwritten by create-vm.yml and destroy-vm.yml.\n{{ cleaned_inventory | to_nice_yaml(indent=2) }}"
    dest: "{{ playbook_dir }}/../inventories/docker_autogenerated.yml"
    mode: "0644"

- name: Assert hostname removed from Docker inventory
  ansible.builtin.assert:
    that: hostname not in (cleaned_inventory.all.hosts | default({}))
    fail_msg: "Failed to remove '{{ hostname }}' from inventories/docker_autogenerated.yml"
