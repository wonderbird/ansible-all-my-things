---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Check iconic font is installed
      ansible.builtin.stat:
        path: /home/testuser/.local/share/fonts/HackNerdFont-Regular.ttf
      register: tmux_font_stat

    - name: Assert iconic font is present
      ansible.builtin.assert:
        that: tmux_font_stat.stat.exists
        fail_msg: "HackNerdFont-Regular.ttf not found at /home/testuser/.local/share/fonts/ despite tmux_install_iconic_font being true"
        success_msg: "HackNerdFont-Regular.ttf found at /home/testuser/.local/share/fonts/"
