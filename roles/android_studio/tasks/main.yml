---
- name: Install Android Studio via snap
  community.general.snap:
    name: android-studio
    classic: true
    state: present

- name: Download Android SDK command-line tools
  ansible.builtin.get_url:
    url: "https://dl.google.com/android/repository/commandlinetools-linux-{{ android_cmdlinetools_build }}_latest.zip"
    dest: "/tmp/commandlinetools-linux-{{ android_cmdlinetools_build }}_latest.zip"
    checksum: "sha1:{{ android_cmdlinetools_sha1 }}"

- name: Create ANDROID_HOME directory
  ansible.builtin.file:
    path: "/home/{{ item }}/Android/Sdk"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0755"
  loop: "{{ desktop_user_names }}"

- name: Create cmdline-tools parent directory
  ansible.builtin.file:
    path: "/home/{{ item }}/Android/Sdk/cmdline-tools"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0755"
  loop: "{{ desktop_user_names }}"

- name: Extract cmdline-tools
  ansible.builtin.unarchive:
    src: "/tmp/commandlinetools-linux-{{ android_cmdlinetools_build }}_latest.zip"
    dest: "/home/{{ item }}/Android/Sdk/cmdline-tools/"
    remote_src: true
    creates: "/home/{{ item }}/Android/Sdk/cmdline-tools/cmdline-tools/bin/sdkmanager"
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"

- name: Rename cmdline-tools to latest
  ansible.builtin.command:
    cmd: >
      mv
      /home/{{ item }}/Android/Sdk/cmdline-tools/cmdline-tools
      /home/{{ item }}/Android/Sdk/cmdline-tools/latest
    creates: "/home/{{ item }}/Android/Sdk/cmdline-tools/latest/bin/sdkmanager"
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"

- name: Detect latest Android API level
  ansible.builtin.shell:
    cmd: >
      /home/{{ item }}/Android/Sdk/cmdline-tools/latest/bin/sdkmanager --list
      | grep -oP 'platforms;android-\K[0-9]+'
      | sort -n
      | tail -1
  environment:
    JAVA_HOME: /snap/android-studio/current/android-studio/jbr
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  register: detected_api_levels
  changed_when: false
  failed_when: detected_api_levels.rc != 0 or detected_api_levels.stdout | trim | length == 0

- name: Detect latest build-tools version
  ansible.builtin.shell:
    cmd: >
      /home/{{ item }}/Android/Sdk/cmdline-tools/latest/bin/sdkmanager --list
      | grep -oP 'build-tools;\K[0-9]+\.[0-9]+\.[0-9]+'
      | sort -V
      | tail -1
  environment:
    JAVA_HOME: /snap/android-studio/current/android-studio/jbr
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  register: detected_buildtools_versions
  changed_when: false
  failed_when: detected_buildtools_versions.rc != 0 or detected_buildtools_versions.stdout | trim | length == 0

- name: Assert detected API level is a valid integer
  ansible.builtin.assert:
    that:
      - item.stdout | trim | regex_search('^[0-9]+$')
    fail_msg: "Detected API level '{{ item.stdout | trim }}' is not a valid integer for user '{{ item.item }}'."
  loop: "{{ detected_api_levels.results }}"

- name: Assert detected build-tools version matches X.Y.Z
  ansible.builtin.assert:
    that:
      - item.stdout | trim | regex_search('^[0-9]+\.[0-9]+\.[0-9]+$')
    fail_msg: "Detected build-tools version '{{ item.stdout | trim }}' does not match X.Y.Z for user '{{ item.item }}'."
  loop: "{{ detected_buildtools_versions.results }}"

- name: Install SDK components
  community.general.android_sdk:
    name:
      - platform-tools
      - "platforms;android-{{ detected_api_levels.results[idx].stdout }}"
      - "build-tools;{{ detected_buildtools_versions.results[idx].stdout }}"
      - emulator
      - "sources;android-{{ detected_api_levels.results[idx].stdout }}"
    state: present
    accept_licenses: true
    sdk_root: "/home/{{ item }}/Android/Sdk"
  environment:
    JAVA_HOME: /snap/android-studio/current/android-studio/jbr
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  loop_control:
    index_var: idx
