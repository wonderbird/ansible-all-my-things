---
- name: Prepare container
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Install python3 and sudo
      ansible.builtin.raw: >
        apt-get update -qq &&
        apt-get install -y -qq python3 sudo
      changed_when: true

    - name: Create testuser
      ansible.builtin.user:
        name: testuser
        state: present
        create_home: true
