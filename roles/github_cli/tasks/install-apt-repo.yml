---
- name: Assert architecture is supported
  ansible.builtin.assert:
    that: ansible_facts['architecture'] in github_cli_arch_map
    fail_msg: >-
      Unsupported architecture: {{ ansible_facts['architecture'] }}.
      Supported: {{ github_cli_arch_map.keys() | list }}

- name: Install python3-debian for deb822_repository module
  ansible.builtin.apt:
    name: python3-debian
    state: present

- name: Download GitHub CLI GPG keyring
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'

- name: Add GitHub CLI apt repository
  ansible.builtin.deb822_repository:
    name: github-cli
    types:
      - deb
    uris: https://cli.github.com/packages
    suites:
      - stable
    components:
      - main
    architectures:
      - "{{ github_cli_arch_map[ansible_facts['architecture']] }}"
    signed_by: /usr/share/keyrings/githubcli-archive-keyring.gpg
    state: present
