---
# Installs Google Chrome stable via the official Google apt repository.
#
# Algorithm:
#   1. Check whether the role-managed apt sources file already exists.
#      If it does, the repository is registered — skip steps 2-5.
#   2. Download and convert Google's signing key into binary GPG format.
#   3. Register the Google apt repository in DEB822 format (.sources file).
#   4. Remove temporary key files.
#   5. Install google-chrome-stable (idempotent — no-op if already present).
#   6. Remove google-chrome.list if Chrome's cron recreated it, to prevent
#      a duplicate repository entry on subsequent runs.
#
# Idempotency: the .sources file is the role's footprint. Chrome's daily cron
# only manages .list files, so .sources is stable across runs.

# The .sources file is the role's footprint — its presence means the repository
# is already registered and steps 2-5 can be skipped entirely.
- name: Check if Google Chrome apt repository is already registered
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/google-chrome.sources
  register: google_chrome_sources_file

# Google publishes an ASCII-armored key; apt requires a binary keyring.
- name: Download Google signing key
  ansible.builtin.get_url:
    url: https://dl-ssl.google.com/linux/linux_signing_key.pub
    dest: /tmp/google-linux-signing-key.pub
    mode: '0644'
  when: not google_chrome_sources_file.stat.exists

- name: Convert signing key to binary GPG format
  ansible.builtin.command:
    cmd: gpg --dearmor --output /tmp/google-chrome.gpg /tmp/google-linux-signing-key.pub
    creates: /tmp/google-chrome.gpg
  changed_when: false
  when: not google_chrome_sources_file.stat.exists

- name: Install signing key into system keyring
  ansible.builtin.copy:
    src: /tmp/google-chrome.gpg
    dest: /etc/apt/keyrings/google-chrome.gpg
    owner: root
    group: root
    mode: '0644'
    remote_src: true
  when: not google_chrome_sources_file.stat.exists

# DEB822 format (.sources) is used because Chrome's daily cron only recreates
# .list files — using .sources avoids conflicts on subsequent runs.
- name: Register Google apt repository
  ansible.builtin.deb822_repository:
    name: google-chrome
    types: deb
    uris: https://dl-ssl.google.com/linux/chrome/deb/
    suites: stable
    components: main
    architectures: amd64
    signed_by: /etc/apt/keyrings/google-chrome.gpg
    state: present
  when: not google_chrome_sources_file.stat.exists

- name: Remove temporary signing key files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/google-linux-signing-key.pub
    - /tmp/google-chrome.gpg
  when: not google_chrome_sources_file.stat.exists

# update_cache is merged into the install task so that a second run reports
# "ok" rather than "changed" when the package is already present.
- name: Install Google Chrome stable
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true

# Chrome's daily cron recreates google-chrome.list, which would duplicate the
# role-managed .sources entry. Removing it here keeps the repository list clean.
- name: Remove repository file managed by Chrome's daily cron
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/google-chrome.list
    state: absent
