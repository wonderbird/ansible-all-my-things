---
- name: Install jq
  ansible.builtin.apt:
    name: jq
    state: present
  become: true

- name: Download rtk deb
  ansible.builtin.get_url:
    url: "https://github.com/rtk-ai/rtk/releases/download/v{{ rtk_version }}/rtk_amd64.deb"
    dest: /tmp/rtk_amd64.deb
    checksum: "sha256:{{ rtk_sha256 }}"
    mode: '0644'
  become: true

- name: Install rtk
  ansible.builtin.apt:
    deb: /tmp/rtk_amd64.deb
    state: present
  become: true
