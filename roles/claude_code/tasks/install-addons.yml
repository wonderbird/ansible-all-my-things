---
# -----
# Clone oh-my-claudecode source repo for each desktop user
# -----

- name: Clone oh-my-claudecode source repository
  ansible.builtin.git:
    repo: https://github.com/Yeachan-Heo/oh-my-claudecode
    dest: /home/{{ item }}/Documents/Cline/oh-my-claudecode
    version: HEAD
    update: yes
    force: no
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"

# -----
# Install beads issue tracker for each desktop user
# -----

- name: Install beads issue tracker
  ansible.builtin.shell:
    cmd: curl -fsSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash
    creates: /home/{{ item }}/.local/bin/bd
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ desktop_user_names }}"

- name: Install beads viewer
  ansible.builtin.shell:
    cmd: curl -fsSL "https://raw.githubusercontent.com/Dicklesworthstone/beads_viewer/main/install.sh" | bash
    creates: /home/{{ item }}/.local/bin/bv
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ desktop_user_names }}"

# -----
# Install OMC CLI for each desktop user
# -----

- name: Check whether omc CLI is already installed
  ansible.builtin.shell: source ~/.nvm/nvm.sh && command -v omc
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  failed_when: false
  changed_when: false
  register: omc_cli_check

- name: Install OMC CLI
  ansible.builtin.shell: source ~/.nvm/nvm.sh && npm install -g oh-my-claude-sisyphus
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  when: (omc_cli_check.results | selectattr('item', 'equalto', item) | first).rc != 0

# -----
# Install Claude Code plugins for each desktop user
# -----

- name: Add oh-my-claudecode plugin to Claude Code marketplace
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin marketplace add https://github.com/Yeachan-Heo/oh-my-claudecode
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_env.PATH }}"
  loop: "{{ desktop_user_names }}"
  changed_when: false

- name: Install oh-my-claudecode plugin
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin install oh-my-claudecode
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_env.PATH }}"
  loop: "{{ desktop_user_names }}"
  changed_when: false

- name: Add caveman plugin to Claude Code marketplace
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin marketplace add JuliusBrussee/caveman
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_env.PATH }}"
  loop: "{{ desktop_user_names }}"
  changed_when: false

- name: Install caveman plugin
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin install caveman@caveman
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_env.PATH }}"
  loop: "{{ desktop_user_names }}"
  changed_when: false
