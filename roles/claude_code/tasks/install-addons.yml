---
# -----
# Clone oh-my-claudecode source repo for each desktop user
# -----

- name: Clone oh-my-claudecode source repository
  ansible.builtin.git:
    repo: https://github.com/Yeachan-Heo/oh-my-claudecode
    dest: /home/{{ item }}/Documents/Cline/oh-my-claudecode
    version: main
    update: yes
    force: no
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"

# -----
# Install beads issue tracker for each desktop user
# -----

- name: Download beads install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh
    dest: /tmp/beads-install.sh
    mode: '0755'
  become: true

- name: Install beads issue tracker
  ansible.builtin.shell:
    cmd: /tmp/beads-install.sh
    creates: /home/{{ item }}/.local/bin/bd
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ desktop_user_names }}"

- name: Download beads viewer install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/Dicklesworthstone/beads_viewer/main/install.sh
    dest: /tmp/beads-viewer-install.sh
    mode: '0755'
  become: true

- name: Install beads viewer
  ansible.builtin.shell:
    cmd: /tmp/beads-viewer-install.sh
    creates: /home/{{ item }}/.local/bin/bv
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ desktop_user_names }}"

- name: Clone beads source repository
  ansible.builtin.git:
    repo: https://github.com/gastownhall/beads.git
    dest: /home/{{ item }}/Documents/Cline/beads
    version: main
    update: yes
    force: no
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"

# -----
# Clone ai-agent-workspace and symlink skills for each desktop user
# -----

- name: Clone ai-agent-workspace source repository
  ansible.builtin.git:
    repo: https://github.com/eudicy/ai-agent-workspace
    dest: /home/{{ item }}/Documents/Cline/ai-agent-workspace
    version: main
    update: yes
    force: no
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"

- name: Ensure ~/.claude/skills exists
  ansible.builtin.file:
    path: /home/{{ item }}/.claude/skills
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0755"
  become: true
  loop: "{{ desktop_user_names }}"

- name: Discover ai-agent-workspace skill directories
  ansible.builtin.find:
    paths: /home/{{ item }}/Documents/Cline/ai-agent-workspace/.claude/skills
    file_type: directory
    recurse: false
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  register: workspace_skill_dirs

- name: Assert ai-agent-workspace has skill directories
  ansible.builtin.assert:
    that:
      - item.matched > 0
    fail_msg: "No skill directories found in ai-agent-workspace clone for {{ item.item }}"
    quiet: true
  loop: "{{ workspace_skill_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Symlink ai-agent-workspace skills into ~/.claude/skills
  ansible.builtin.file:
    src: "{{ item.1.path }}"
    path: /home/{{ item.0.item }}/.claude/skills/{{ item.1.path | basename }}
    state: link
    force: no
  become: true
  become_user: "{{ item.0.item }}"
  loop: "{{ workspace_skill_dirs.results | subelements('files') }}"
  loop_control:
    label: "{{ item.0.item }}:{{ item.1.path | basename }}"

# -----
# Install OMC CLI for each desktop user
# -----

- name: Check whether omc CLI is already installed
  ansible.builtin.shell: source ~/.nvm/nvm.sh && command -v omc
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  failed_when: false
  changed_when: false
  register: omc_cli_check

- name: Install OMC CLI
  ansible.builtin.shell: source ~/.nvm/nvm.sh && npm install -g oh-my-claude-sisyphus
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  when: (omc_cli_check.results | selectattr('item', 'equalto', item) | first).rc != 0

# -----
# Install Claude Code plugins for each desktop user
# -----

- name: Check Claude Code plugin marketplaces
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin marketplace list
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  failed_when: false
  changed_when: false
  register: plugin_marketplace_check

- name: Check Claude Code plugins installed
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin list
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  failed_when: false
  changed_when: false
  register: plugin_list_check

- name: Add oh-my-claudecode plugin to Claude Code marketplace
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin marketplace add https://github.com/Yeachan-Heo/oh-my-claudecode
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  when: "'  ❯ omc' not in (plugin_marketplace_check.results | selectattr('item', 'equalto', item) | first).stdout_lines"

- name: Install oh-my-claudecode plugin
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin install oh-my-claudecode
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  when: "'  ❯ oh-my-claudecode@omc' not in (plugin_list_check.results | selectattr('item', 'equalto', item) | first).stdout_lines"

- name: Add caveman plugin to Claude Code marketplace
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin marketplace add JuliusBrussee/caveman
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  when: "'  ❯ caveman' not in (plugin_marketplace_check.results | selectattr('item', 'equalto', item) | first).stdout_lines"

- name: Install caveman plugin
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin install caveman@caveman
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  when: "'  ❯ caveman@caveman' not in (plugin_list_check.results | selectattr('item', 'equalto', item) | first).stdout_lines"

- name: Add claude-plugins-official marketplace to Claude Code
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin marketplace add anthropics/claude-plugins-official
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  when: >-
    (plugin_marketplace_check.results
     | selectattr('item', 'equalto', item)
     | first).stdout_lines
     | select('match', '^\\s*❯\\s+claude-plugins-official$')
     | list
     | length == 0

- name: Install context7 plugin
  ansible.builtin.shell:
    cmd: /home/{{ item }}/.local/bin/claude plugin install context7@claude-plugins-official
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ desktop_user_names }}"
  when: >-
    (plugin_list_check.results
     | selectattr('item', 'equalto', item)
     | first).stdout_lines
     | select('search', 'context7')
     | list
     | length == 0

# -----
# Install speckit CLI for each desktop user
# -----

- name: Install specify-cli via pipx
  ansible.builtin.shell:
    cmd: pipx install git+https://github.com/github/spec-kit.git@v0.8.18
    creates: /home/{{ item }}/.local/bin/specify
  become: true
  become_user: "{{ item }}"
  environment:
    PATH: "/home/{{ item }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ desktop_user_names }}"

# -----
# Configure Exa MCP server for each desktop user
# -----

- name: Check if exa MCP server is already configured
  ansible.builtin.shell:
    cmd: /home/{{ item.name }}/.local/bin/claude mcp list
  become: true
  become_user: "{{ item.name }}"
  environment:
    PATH: "/home/{{ item.name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ desktop_users }}"
  no_log: true
  failed_when: false
  changed_when: false
  register: exa_mcp_check

- name: Configure exa MCP server
  ansible.builtin.shell:
    cmd: >
      /home/{{ item.name }}/.local/bin/claude mcp add --scope user exa
      -e EXA_API_KEY={{ item.exa_api_key }} -- npx -y exa-mcp-server
  become: true
  become_user: "{{ item.name }}"
  no_log: true
  environment:
    PATH: "/home/{{ item.name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ desktop_users }}"
  when: >-
    (exa_mcp_check.results
     | selectattr('item.name', 'equalto', item.name)
     | first).stdout is not search('exa')
