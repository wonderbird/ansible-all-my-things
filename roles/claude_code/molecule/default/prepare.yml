---
- name: Prepare container
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Create testuser
      ansible.builtin.user:
        name: testuser
        state: present
        create_home: true

    - name: Create Documents/Cline directory for testuser
      ansible.builtin.file:
        path: /home/testuser/Documents/Cline
        state: directory
        owner: testuser
        group: testuser
        mode: '0755'

    - name: Download NVM install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh
        dest: /tmp/nvm-install.sh
        mode: '0755'

    - name: Install nvm for testuser
      ansible.builtin.shell:
        cmd: /tmp/nvm-install.sh
        creates: /home/testuser/.nvm/nvm.sh
      become_user: testuser
      environment:
        HOME: /home/testuser

    - name: Install curl for nvm runtime
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: true

    - name: Install Node.js LTS via nvm
      ansible.builtin.shell: source /home/testuser/.nvm/nvm.sh && nvm install --lts
      args:
        executable: /bin/bash
      become_user: testuser
      environment:
        HOME: /home/testuser
      changed_when: false
