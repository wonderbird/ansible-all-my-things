---
- name: Prepare container
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Create testuser
      ansible.builtin.user:
        name: testuser
        state: present
        create_home: true

    - name: Create Documents/Cline directory for testuser
      ansible.builtin.file:
        path: /home/testuser/Documents/Cline
        state: directory
        owner: testuser
        group: testuser
        mode: '0755'

    - name: Install nvm for testuser
      ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/HEAD/install.sh | bash
      args:
        executable: /bin/bash
        creates: /home/testuser/.nvm/nvm.sh
      become: true
      become_user: testuser
      environment:
        HOME: /home/testuser

    - name: Install Node.js LTS via nvm
      ansible.builtin.shell: source /home/testuser/.nvm/nvm.sh && nvm install --lts
      args:
        executable: /bin/bash
      become: true
      become_user: testuser
      environment:
        HOME: /home/testuser
      changed_when: false
