---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Check CLAUDE_PLUGIN_ROOT is configured in testuser's .bashrc
      ansible.builtin.shell: grep -q 'CLAUDE_PLUGIN_ROOT=/home/testuser/.claude/plugins' /home/testuser/.bashrc
      changed_when: false
      failed_when: false
      register: claude_plugin_root_val

    - name: Assert CLAUDE_PLUGIN_ROOT is configured in .bashrc
      ansible.builtin.assert:
        that:
          - claude_plugin_root_val.rc == 0
        fail_msg: "CLAUDE_PLUGIN_ROOT not found in testuser's .bashrc"
        success_msg: "CLAUDE_PLUGIN_ROOT is configured in testuser's .bashrc"

    - name: Check Claude Code binary exists
      ansible.builtin.stat:
        path: /home/testuser/.local/bin/claude
      register: claude_binary_stat

    - name: Assert Claude Code binary is present
      ansible.builtin.assert:
        that:
          - claude_binary_stat.stat.exists
        fail_msg: "Claude Code binary not found at /home/testuser/.local/bin/claude"
        success_msg: "Claude Code binary found at /home/testuser/.local/bin/claude"

    - name: Check Oh My Claude Code plugin cache directory exists
      ansible.builtin.stat:
        path: /home/testuser/.claude/plugins/cache/omc/oh-my-claudecode
      register: omc_cache_stat

    - name: Assert Oh My Claude Code plugin is installed
      ansible.builtin.assert:
        that:
          - omc_cache_stat.stat.exists
        fail_msg: "Oh My Claude Code not found at /home/testuser/.claude/plugins/cache/omc/oh-my-claudecode"
        success_msg: "Oh My Claude Code found at /home/testuser/.claude/plugins/cache/omc/oh-my-claudecode"

    - name: Check beads binary exists
      ansible.builtin.stat:
        path: /home/testuser/.local/bin/bd
      register: beads_stat

    - name: Assert beads is installed
      ansible.builtin.assert:
        that:
          - beads_stat.stat.exists
        fail_msg: "beads binary not found at /home/testuser/.local/bin/bd"
        success_msg: "beads binary found at /home/testuser/.local/bin/bd"

    - name: Check beads viewer binary exists
      ansible.builtin.stat:
        path: /home/testuser/.local/bin/bv
      register: bv_binary

    - name: Assert beads viewer is installed
      ansible.builtin.assert:
        that:
          - bv_binary.stat.exists
        fail_msg: "beads viewer (bv) binary not found"
        success_msg: "beads viewer (bv) binary found at /home/testuser/.local/bin/bv"

    - name: Check oh-my-claudecode source repository exists
      ansible.builtin.stat:
        path: /home/testuser/Documents/Cline/oh-my-claudecode/.git
      register: omc_src_stat

    - name: Assert oh-my-claudecode source repository is cloned
      ansible.builtin.assert:
        that:
          - omc_src_stat.stat.exists
        fail_msg: "oh-my-claudecode source repo not found at /home/testuser/Documents/Cline/oh-my-claudecode/.git"
        success_msg: "oh-my-claudecode source repo found at /home/testuser/Documents/Cline/oh-my-claudecode/.git"

    - name: Check jq is installed
      ansible.builtin.stat:
        path: /usr/bin/jq
      register: jq_stat

    - name: Assert jq is installed
      ansible.builtin.assert:
        that:
          - jq_stat.stat.exists
        fail_msg: "jq not found at /usr/bin/jq"
        success_msg: "jq found at /usr/bin/jq"

    - name: Check omc CLI is available
      ansible.builtin.shell: source ~/.nvm/nvm.sh && omc --version
      args:
        executable: /bin/bash
      become: true
      become_user: testuser
      register: omc_version_result
      changed_when: false

    - name: Assert omc CLI is available
      ansible.builtin.assert:
        that:
          - omc_version_result.rc == 0
        fail_msg: "omc --version failed with rc {{ omc_version_result.rc }}"
        success_msg: "omc CLI available"

    - name: Read settings.json
      ansible.builtin.slurp:
        src: /home/testuser/.claude/settings.json
      register: settings_file

    - name: Assert settings.json contains required keys
      ansible.builtin.assert:
        that:
          - settings.env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS == "1"
          - settings.env.CLAUDE_CODE_SPAWN_BACKEND == "tmux"
          - settings.teammateMode == "tmux"
        fail_msg: "settings.json missing required agent-team keys"
        success_msg: "settings.json contains all required agent-team keys"
      vars:
        settings: "{{ settings_file.content | b64decode | from_json }}"

    - name: Check rtk binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/rtk
      register: rtk_stat

    - name: Assert rtk is installed
      ansible.builtin.assert:
        that:
          - rtk_stat.stat.exists
        fail_msg: "rtk binary not found at /usr/local/bin/rtk"
        success_msg: "rtk binary found at /usr/local/bin/rtk"

    - name: Check rtk hook is configured in settings.json
      ansible.builtin.shell: >
        jq -e '.hooks.PreToolUse[] | select(.matcher == "Bash") | .hooks[] |
        select(.command == "rtk hook claude")' /home/testuser/.claude/settings.json
      changed_when: false
      failed_when: false
      register: rtk_hook_check

    - name: Assert rtk PreToolUse hook is present in settings.json
      ansible.builtin.assert:
        that:
          - rtk_hook_check.rc == 0
        fail_msg: "rtk hook claude not found in settings.json PreToolUse hooks"
        success_msg: "rtk hook claude configured in settings.json"
