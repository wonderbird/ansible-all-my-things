#SPDX-License-Identifier: MIT-0
---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: instance
    image: molecule_claude_code_instance
    pre_build_image: false
    dockerfile: Dockerfile
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../"
    ANSIBLE_PODMAN_MOUNT_DETECTION: "false"
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
